name: Publicar version web (GitHub Pages)

# Publica la carpeta de la interfaz (src/renderer) como sitio web.
# Requiere que en Settings -> Pages la "Source" este en "GitHub Actions".
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir la interfaz (src/renderer) como sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/renderer

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
