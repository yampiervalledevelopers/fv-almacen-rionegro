name: Construir instalador Windows

# Se ejecuta manualmente desde la pestana "Actions" (boton "Run workflow").
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Generar el instalador (.exe)
        run: npm run dist:win -- --publish never

      - name: Subir el instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Inventario-FVIECOM-Windows
          path: dist/*.exe
          if-no-files-found: error
